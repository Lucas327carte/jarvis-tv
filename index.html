<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>J.A.R.V.I.S</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00e5ff;
      --cyan-dim: rgba(0, 229, 255, 0.18);
      --cyan-mid: rgba(0, 229, 255, 0.55);
      --bg: #020b12;
      --panel: rgba(0, 18, 30, 0.75);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #dffbff;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--cyan-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--cyan-dim) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridPulse 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(0,229,255,0.10), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 3vh 4vw;
      gap: 2vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--cyan-mid);
      padding-bottom: 1.5vh;
    }

    .logo-wrap { display: flex; align-items: center; gap: 1.5vw; }

    /* Core radar orb next to logo */
    .core {
      position: relative;
      width: clamp(48px, 6vw, 72px);
      height: clamp(48px, 6vw, 72px);
      flex-shrink: 0;
    }
    .core .ring {
      position: absolute; inset: 0;
      border: 2px solid var(--cyan);
      border-radius: 50%;
      opacity: 0.7;
    }
    .core .ring.r2 { inset: 8px; animation: ringSpin 6s linear infinite; border-style: dashed; }
    .core .ring.r3 { inset: 16px; animation: ringSpin 4s linear infinite reverse; }
    .core .sweep {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(0,229,255,0.9), transparent 35%);
      animation: ringSpin 2.2s linear infinite;
      mix-blend-mode: screen;
    }
    .core .dot {
      position: absolute; top: 50%; left: 50%;
      width: 8px; height: 8px; margin: -4px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan);
      animation: dotPulse 1.6s ease-in-out infinite;
    }
    @keyframes ringSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes dotPulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1;} 50% { transform: translate(-50%,-50%) scale(1.6); opacity:0.6;} }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2.2rem, 4.6vw, 3.8rem);
      letter-spacing: 0.16em;
      color: var(--cyan);
      text-shadow: 0 0 24px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.3);
      animation: logoBlink 3s ease-in-out infinite;
    }

    @keyframes logoBlink {
      0%, 100% { text-shadow: 0 0 24px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.3); }
      50%       { text-shadow: 0 0 40px rgba(0,229,255,1),   0 0 90px rgba(0,229,255,0.5); }
    }

    .header-right { text-align: right; }

    .status-line {
      font-size: clamp(0.75rem, 1.4vw, 1.1rem);
      color: rgba(0,229,255,0.7);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px; justify-content: flex-end;
    }
    .status-led {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff9d; box-shadow: 0 0 8px #00ff9d;
      animation: dotPulse 1.6s ease-in-out infinite;
    }

    #clock {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      color: var(--cyan);
      letter-spacing: 0.1em;
    }

    /* ── MAIN PANELS ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5vw;
      align-items: stretch;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--cyan-mid);
      border-radius: 18px;
      box-shadow: 0 0 32px var(--cyan-dim), inset 0 0 30px rgba(0,229,255,0.05);
      padding: 3vh 2.5vw;
      display: flex;
      flex-direction: column;
      gap: 1.5vh;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    /* Animated border sweep */
    .panel::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 18px;
      background: conic-gradient(from 0deg, transparent 0%, var(--cyan) 8%, transparent 16%);
      opacity: 0.5;
      animation: borderSweep 5s linear infinite;
      z-index: -1;
    }
    .panel::after {
      content: '';
      position: absolute; inset: 1px;
      border-radius: 17px;
      background: var(--panel);
      z-index: -1;
    }
    @keyframes borderSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .panel-label {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.7rem, 1.3vw, 1rem);
      letter-spacing: 0.2em;
      color: var(--cyan);
      text-transform: uppercase;
      opacity: 0.9;
      display: flex; align-items: center; gap: 10px;
    }
    .panel-label .bar {
      display: inline-flex; gap: 3px;
    }
    .panel-label .bar span {
      width: 3px; height: 12px;
      background: var(--cyan);
      opacity: 0.4;
      animation: barWave 1.2s ease-in-out infinite;
    }
    .panel-label .bar span:nth-child(2) { animation-delay: 0.15s; }
    .panel-label .bar span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes barWave { 0%,100% { opacity:0.3; height:6px; } 50% { opacity:1; height:16px; } }

    .panel-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--cyan-mid), transparent);
    }

    .panel-content {
      font-size: clamp(1.1rem, 2.2vw, 1.8rem);
      font-weight: 300;
      line-height: 1.5;
      color: #e8faff;
      flex: 1;
      display: flex;
      align-items: center;
      min-height: 12vh;
    }

    #question-text { font-style: italic; opacity: 0.85; }

    #response-text {
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(0,229,255,0.4);
    }

    .cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--cyan);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--cyan-mid);
      padding-top: 1.5vh;
      font-size: clamp(0.65rem, 1.2vw, 0.95rem);
      color: rgba(0,229,255,0.55);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .loading { opacity: 0.4; font-style: italic; }
  </style>
</head>
<body>

<div class="scanlines"></div>

<div class="screen">

  <header>
    <div class="logo-wrap">
      <div class="core">
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="sweep"></div>
        <div class="dot"></div>
      </div>
      <div class="logo">J.A.R.V.I.S</div>
    </div>
    <div class="header-right">
      <div class="status-line"><span class="status-led"></span>SYSTÈME DOMOTIQUE · ACTIF</div>
      <div id="clock">--:--:--</div>
    </div>
  </header>

  <div class="panels">

    <div class="panel">
      <div class="panel-label">◈ REQUÊTE <span class="bar"><span></span><span></span><span></span></span></div>
      <div class="panel-divider"></div>
      <div class="panel-content">
        <span id="question-text" class="loading">En attente d'une requête…</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">◈ RÉPONSE <span class="bar"><span></span><span></span><span></span></span></div>
      <div class="panel-divider"></div>
      <div class="panel-content">
        <span id="response-text" class="loading">Système prêt<span class="cursor"></span></span>
      </div>
    </div>

  </div>

  <footer>
    <span>HOME ASSISTANT · RÉSEAU LOCAL</span>
    <span id="last-update">Dernière mise à jour : --</span>
    <span>LUCAS.C · COURNONTERRAL</span>
  </footer>

</div>

<script>
  const HA_URL = "https://by5fqhjrysqigiccsd5nogd6l0zykwfi.ui.nabu.casa";
  const HA_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI0MDdiNDE3MTM2YWU0ZDJkOTdlYzA2YTE5NWI3NTY0YyIsImlhdCI6MTc4Mjg5ODY4MywiZXhwIjoyMDk4MjU4NjgzfQ.Rqmj8WjYFu-ip5iBTe2VuwXtCplhL4H92gnja8B25vA";

  const QUESTION_ENTITY = "input_text.jarvis_question";
  const RESPONSE_ENTITY  = "input_text.jarvis_reponse";
  const REFRESH_MS = 2000;

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  async function fetchEntity(entityId) {
    const res = await fetch(`${HA_URL}/api/states/${entityId}`, {
      headers: { Authorization: `Bearer ${HA_TOKEN}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.state || '';
  }

  async function refresh() {
    try {
      const [question, response] = await Promise.all([
        fetchEntity(QUESTION_ENTITY),
        fetchEntity(RESPONSE_ENTITY)
      ]);

      const qEl = document.getElementById('question-text');
      const rEl = document.getElementById('response-text');

      qEl.classList.remove('loading');
      rEl.classList.remove('loading');

      qEl.textContent = question || 'En attente d\'une requête…';
      rEl.innerHTML   = (response || 'Système prêt') + '<span class="cursor"></span>';

      const now = new Date();
      document.getElementById('last-update').textContent =
        'Dernière mise à jour : ' + now.toLocaleTimeString('fr-FR');

    } catch (e) {
      console.warn('Erreur HA:', e);
    }
  }

  setInterval(refresh, REFRESH_MS);
  refresh();
</script>
</body>
</html>
